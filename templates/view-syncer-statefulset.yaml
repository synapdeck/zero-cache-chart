{{- if not .Values.singleNode.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "zero-cache.fullname" . }}-view-syncer
  labels:
    {{- include "zero-cache.labels" . | nindent 4 }}
    app.kubernetes.io/component: view-syncer
spec:
  replicas: {{ .Values.viewSyncer.replicas }}
  selector:
    matchLabels:
      {{- include "zero-cache.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: view-syncer
  serviceName: {{ include "zero-cache.fullname" . }}-view-syncer-headless
  template:
    metadata:
      labels:
        {{- include "zero-cache.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: view-syncer
      {{- with .Values.viewSyncer.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "zero-cache.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30
      securityContext:
        {{- toYaml .Values.podSecurityContext | default dict | nindent 8 }}
      initContainers:
        - name: wait-for-replication-manager
          image: busybox:1.37
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              until wget -q --spider http://{{ include "zero-cache.fullname" . }}-replication-manager:{{ .Values.replicationManager.service.port }}/keepalive 2>/dev/null; do
                echo "Waiting for replication manager..."
                sleep 5
              done
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | default dict | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.viewSyncer.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /keepalive
              port: {{ .Values.viewSyncer.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /keepalive
              port: {{ .Values.viewSyncer.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          {{- if .Values.viewSyncer.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: /keepalive
              port: {{ .Values.viewSyncer.service.port }}
            initialDelaySeconds: {{ .Values.viewSyncer.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.viewSyncer.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.viewSyncer.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.viewSyncer.startupProbe.failureThreshold }}
            successThreshold: {{ .Values.viewSyncer.startupProbe.successThreshold }}
          {{- end }}
          env:
            {{- include "zero-cache.env.core" (dict "port" .Values.viewSyncer.service.port "root" .) | nindent 12 }}
            - name: ZERO_CHANGE_STREAMER_MODE
              value: "discover"
            {{- include "zero-cache.env.auth" . | nindent 12 }}
            {{- include "zero-cache.env.admin" . | nindent 12 }}
            {{- include "zero-cache.env.database" . | nindent 12 }}
            {{- include "zero-cache.env.litestream" . | nindent 12 }}
            {{- include "zero-cache.env.s3" . | nindent 12 }}
            {{- include "zero-cache.env.performance" . | nindent 12 }}
            {{- include "zero-cache.env.logging" . | nindent 12 }}
            {{- include "zero-cache.env.ratelimit" . | nindent 12 }}
            {{- include "zero-cache.env.mutators" . | nindent 12 }}
            {{- include "zero-cache.env.advanced" . | nindent 12 }}
          resources:
            {{- toYaml .Values.viewSyncer.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if or .Values.s3.enabled .Values.common.litestream.backupUrl }}
            - name: litestream-config
              mountPath: /etc/litestream
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
      {{- with .Values.viewSyncer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.viewSyncer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.viewSyncer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- if not .Values.viewSyncer.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if or .Values.s3.enabled .Values.common.litestream.backupUrl }}
        - name: litestream-config
          configMap:
            name: {{ include "zero-cache.fullname" . }}-litestream-config
        {{- end }}
        - name: tmp
          emptyDir: {}
  {{- if .Values.viewSyncer.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "zero-cache.labels" . | nindent 10 }}
          app.kubernetes.io/component: view-syncer
        {{- with .Values.viewSyncer.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.viewSyncer.persistence.accessMode }}
        {{- if .Values.viewSyncer.persistence.storageClass }}
        storageClassName: {{ .Values.viewSyncer.persistence.storageClass }}
        {{- end }}
        volumeMode: Filesystem
        resources:
          requests:
            storage: {{ .Values.viewSyncer.persistence.size }}
  {{- end }}
{{- end }}
