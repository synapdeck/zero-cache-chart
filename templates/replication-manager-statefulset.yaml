{{- if not .Values.singleNode.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "zero-cache.fullname" . }}-replication-manager
  labels:
    {{- include "zero-cache.labels" . | nindent 4 }}
    app.kubernetes.io/component: replication-manager
spec:
  serviceName: {{ include "zero-cache.fullname" . }}-replication-manager-headless
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "zero-cache.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: replication-manager
  template:
    metadata:
      labels:
        {{- include "zero-cache.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: replication-manager
      {{- with .Values.replicationManager.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "zero-cache.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30
      securityContext:
        {{- toYaml .Values.podSecurityContext | default dict | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | default dict | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: change-stream
              containerPort: {{ .Values.replicationManager.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /keepalive
              port: {{ .Values.replicationManager.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /keepalive
              port: {{ .Values.replicationManager.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          {{- if .Values.replicationManager.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: /keepalive
              port: {{ .Values.replicationManager.service.port }}
            initialDelaySeconds: {{ .Values.replicationManager.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.replicationManager.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.replicationManager.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.replicationManager.startupProbe.failureThreshold }}
            successThreshold: {{ .Values.replicationManager.startupProbe.successThreshold }}
          {{- end }}
          env:
            {{- include "zero-cache.env.core" (dict "port" .Values.replicationManager.service.port "root" .) | nindent 12 }}
            - name: ZERO_NUM_SYNC_WORKERS
              value: "0"
            {{- include "zero-cache.env.auth" . | nindent 12 }}
            {{- include "zero-cache.env.admin" . | nindent 12 }}
            {{- include "zero-cache.env.database" . | nindent 12 }}
            {{- if .Values.common.litestream.backupUrl }}
            - name: ZERO_LITESTREAM_BACKUP_URL
              value: "{{ .Values.common.litestream.backupUrl }}"
            {{- end }}
            {{- include "zero-cache.env.litestream" . | nindent 12 }}
            {{- include "zero-cache.env.s3" . | nindent 12 }}
            {{- include "zero-cache.env.performance" . | nindent 12 }}
            {{- include "zero-cache.env.logging" . | nindent 12 }}
            {{- include "zero-cache.env.ratelimit" . | nindent 12 }}
            {{- include "zero-cache.env.mutators" . | nindent 12 }}
            {{- include "zero-cache.env.advanced" . | nindent 12 }}
          resources:
            {{- toYaml .Values.replicationManager.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if or .Values.s3.enabled .Values.common.litestream.backupUrl }}
            - name: litestream-config
              mountPath: /etc/litestream
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
      {{- with .Values.replicationManager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- if or .Values.s3.enabled .Values.common.litestream.backupUrl }}
        - name: litestream-config
          configMap:
            name: {{ include "zero-cache.fullname" . }}-litestream-config
        {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.replicationManager.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.replicationManager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.replicationManager.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "zero-cache.labels" . | nindent 10 }}
          app.kubernetes.io/component: replication-manager
        {{- with .Values.replicationManager.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.replicationManager.persistence.accessMode }}
        {{- if .Values.replicationManager.persistence.storageClass }}
        storageClassName: {{ .Values.replicationManager.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.replicationManager.persistence.size }}
  {{- end }}
{{- end }}
