name: Version Management

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  validate-chart:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Lint chart
        run: nix develop --command helm lint .
      - name: Validate templates
        run: |
          nix develop --command bash -c "
            helm template zero-cache . | kubeconform -strict -summary
          "
      - name: Run tests
        run: nix develop --command uv run pytest -v

  update-versions:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set git identity
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Update versions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          nix run .#default -- update \
            --docker-image=rocicorp/zero \
            --chart-path=Chart.yaml \
            --oci-registry=ghcr.io \
            --oci-repo=synapdeck/zero-cache-chart \
            --branch-retention=3

  prune-oci:
    if: github.event_name != 'pull_request'
    needs: update-versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Prune untagged OCI versions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          nix run .#default -- prune \
            --oci-registry=ghcr.io \
            --oci-repo=synapdeck/zero-cache-chart \
            --max-age-days=7
